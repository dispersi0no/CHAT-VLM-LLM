name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libmagic1
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov flake8 black isort mypy httpx
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        pip install transformers==4.47.1 accelerate==1.2.1 qwen-vl-utils==0.0.14
        pip install bitsandbytes==0.45.0
        pip install fastapi==0.115.6 uvicorn==0.34.0 python-multipart==0.0.19
        pip install streamlit==1.41.1
        pip install pillow==11.1.0 pyyaml==6.0.2 requests==2.32.3 numpy==1.26.4 pandas==2.2.3
        pip install opencv-python-headless==4.10.0.84
    
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
    
    - name: Check formatting with black
      run: black --check --diff .
    
    - name: Check imports with isort
      run: isort --check-only --diff .
    
    - name: Type check with mypy
      continue-on-error: true
      run: mypy utils/ models/ --config-file mypy.ini
    
    - name: Run tests with coverage
      run: pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=15
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker image
      run: docker build -t chatvlmllm:latest .
    
    - name: Test Docker image
      run: docker run --rm chatvlmllm:latest python -c "from models import ModelLoader; print('OK')"

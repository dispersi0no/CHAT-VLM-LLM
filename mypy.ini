[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
check_untyped_defs = False
disallow_untyped_defs = False
exclude = (?x)(
    tests/
    | notebooks/
    | scripts/
    | experimental/
  )

[mypy-streamlit.*]
ignore_errors = True

[mypy-torch.*]
ignore_errors = True

[mypy-transformers.*]
ignore_errors = True
